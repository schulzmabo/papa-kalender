<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Papa">
<title>Papa's Kalender</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #1c1c1e; color: #f2f2f7; }
.app-header { background: #7F77DD; padding: 18px 16px 14px; text-align: center; }
.app-header h1 { font-size: 21px; font-weight: 600; color: white; }
.app-header p { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
.nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #2c2c2e; border-bottom: 0.5px solid #3a3a3c; position: sticky; top: 0; z-index: 10; }
.nav-btn { background: #48484a; border: none; color: #c0bcf5; font-size: 26px; line-height: 1; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-btn:active { background: #636366; }
.nav-title { font-size: 16px; font-weight: 600; color: #f2f2f7; text-align: center; flex: 1; }
.list { background: #1c1c1e; padding: 10px 12px 32px; }
.card { background: #2c2c2e; border-radius: 14px; margin-bottom: 10px; overflow: hidden; border: 0.5px solid #3a3a3c; }
.card.is-today { border: 2px solid #9D97E8; }
.card.is-empty { opacity: 0.3; }
.card-inner { display: flex; min-height: 56px; }
.date-col { width: 62px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 8px; border-right: 0.5px solid #3a3a3c; background: #242426; }
.date-dow { font-size: 10px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.date-num { font-size: 26px; font-weight: 500; color: #f2f2f7; line-height: 1; }
.date-num.today { color: #9D97E8; font-weight: 700; }
.card.is-weekend .date-dow { color: #E8A84A; }
.card.is-weekend .date-num { color: #E8A84A; }
.shift-col { width: 4px; flex-shrink: 0; }
.shift-col.frueh    { background: #5DCAA5; }
.shift-col.zwischen { background: #378ADD; }
.shift-col.spaet    { background: #EF9F27; }
.shift-col.nacht    { background: #9D97E8; }
.shift-col.frei     { background: #7DBF3F; }
.shift-col.urlaub   { background: #ED93B1; }
.shift-col.none     { background: transparent; }
.content-col { flex: 1; min-width: 0; padding: 11px 14px; display: flex; flex-direction: column; gap: 5px; justify-content: center; }
.main-line { display: flex; align-items: center; justify-content: space-between; }
.time-row { display: flex; align-items: baseline; flex: 1; min-width: 0; }
.t-time  { font-size: 16px; font-weight: 500; color: #f2f2f7; white-space: nowrap; min-width: 115px; flex-shrink: 0; }
.t-label { font-size: 16px; font-weight: 400; color: #8e8e93; }
.t-label.event { color: #f2f2f7; }
.urlaub-label { font-size: 15px; font-weight: 600; color: #ED93B1; }
.wetter-chip { display: flex; align-items: center; gap: 3px; flex-shrink: 0; margin-left: 8px; }
.wetter-chip .wi { font-size: 17px; line-height: 1; }
.wetter-chip .wt { font-size: 13px; font-weight: 500; color: #f2f2f7; }
.tag-row { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px 14px 8px; border-top: 0.5px solid #3a3a3c; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.tag-ferien   { background: #3d2e0f; color: #e8a84a; }
.tag-feiertag { background: #0f2540; color: #5aabf5; }
.footer { font-size: 10px; color: #636366; text-align: center; padding: 6px 12px 24px; }
</style>
</head>
<body>

  <button class="nav-btn" onclick="go(1)">&#8250;</button>

<div class="footer" id="footer">&#127777; Wetter wird geladen&#8230;</div>

};
const MO=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const WO=['So','Mo','Di','Mi','Do','Fr','Sa'];
let KALENDER={},WETTER={};
const _n=new Date(); let yr=_n.getFullYear(),mo=_n.getMonth();
function pad(n){return String(n).padStart(2,'0');}
function getFerien(d){for(const f of FERIEN){if(d>=f.von&&d<=f.bis)return true;}return false;}
function go(dir){mo+=dir;if(mo<0){mo=11;yr--;}if(mo>11){mo=0;yr++;}render();}
function wmoIcon(c,r){
  if(c===0)return'☀️';if(c<=2)return'🌤';if(c===3)return'☁️';
  if(c<=49)return'🌫';if(c<=67)return'🌧';if(c<=77)return'❄️';
  if(c<=82)return'🌦';if(c<=84)return'🌨';if(c<=99)return'⛈';
  return r>=70?'🌧':r>=40?'🌦':r>=20?'⛅':'🌤';
}
async function ladeWetter(){
  try{
    // Rheinbach 53359: lat 50.6200, lon 6.9500
    // current = Echtzeit-Temperatur jetzt
    // daily = Tagesvorhersage heute + 2 Tage (max temp, regen, wettercode)
    const url='https://api.open-meteo.com/v1/forecast'
      +'?latitude=50.6256&longitude=6.9491'
      +'&current=temperature_2m,weathercode,precipitation'
      +'&daily=temperature_2m_max,precipitation_probability_max,weathercode'
      +'&timezone=Europe%2FBerlin&forecast_days=3';
    const r=await fetch(url);
    const d=await r.json();

    // Echtzeit-Temperatur für Footer
    const jetztTemp = Math.round(d.current.temperature_2m);
    const jetztIcon = wmoIcon(d.current.weathercode, 0);

    // Tages-Wetter für Kacheln (heute + 2 Tage)
    d.daily.time.forEach((dt,i)=>{
      WETTER[dt]={
        temp: Math.round(d.daily.temperature_2m_max[i]),
        icon: wmoIcon(d.daily.weathercode[i], d.daily.precipitation_probability_max[i])
      };
    });

    document.getElementById('footer').textContent=
      `${jetztIcon} Jetzt ${jetztTemp}° · Rheinbach · Live via Open-Meteo`;
    render();
  }catch(e){
    document.getElementById('footer').textContent='⚠️ Wetter nicht verfügbar';
  }
}
async function ladeKalender(){
  try{const r=await fetch('https://www.dropbox.com/scl/fi/nbr87f9d2cvboebzafax5/kalender.json?rlkey=czanflvk4fj8svmgyy8w141vc&dl=1');const d=await r.json();KALENDER=d.schichten||{};}
  catch(e){KALENDER=FALLBACK;}
  render();ladeWetter();
}
function render(){
  const lbl=MO[mo]+' '+yr;
  document.getElementById('nav-title').textContent=lbl;
  document.getElementById('hdr-sub').textContent=lbl;
  const dim=new Date(yr,mo+1,0).getDate();
  const now=new Date();
  const list=document.getElementById('list');
  list.innerHTML='';
  for(let d=1;d<=dim;d++){
    const ds=yr+'-'+pad(mo+1)+'-'+pad(d);
    const dt=new Date(yr,mo,d);
    const dow=dt.getDay();
    const isToday=now.getFullYear()===yr&&now.getMonth()===mo&&now.getDate()===d;
    const ft=FT[ds],fer=getFerien(ds);
    const dd=KALENDER[ds]||{};
    const s=dd.schicht?SCHICHTEN[dd.schicht]:null;
    const evs=dd.events||[];
    const w=WETTER[ds];

    // Typ für Farbstreifen
    const typ=s?s.typ:(dd.schicht==='FREI'?'frei':dd.schicht==='URLAUB'?'urlaub':'none');

    // Ist der Tag komplett leer? (kein Schicht, keine Events, kein Feiertag, kein Ferien)
    const isEmpty = !dd.schicht && !evs.length && !ft && !fer;

    const card=document.createElement('div');
    card.className='card'+(isToday?' is-today':isEmpty?' is-empty':'');

    const wChip=w?`<div class="wetter-chip"><span class="wi">${w.icon}</span><span class="wt">${w.temp}°</span></div>`:'';
    function zeile(zeit,label,ev){return`<div class="time-row"><span class="t-time">${zeit||''}</span><span class="t-label${ev?' event':''}">${label}</span></div>`;}
    function erste(inhalt){return`<div class="main-line">${inhalt}${wChip}</div>`;}

    let h=`<div class="card-inner">
      <div class="date-col">
        <div class="date-dow">${WO[dow]}</div>
        <div class="date-num${isToday?' today':''}">${d}</div>
      </div>
      <div class="shift-col ${typ}"></div>
      <div class="content-col">`;

    if(s&&s.von){
      // Dienst mit Uhrzeit
      h+=erste(zeile(s.von+' – '+s.bis,'Dienst',false));
      evs.forEach(ev=>{h+=zeile(ev.zeit||'',ev.text,true);});
    } else if(dd.schicht==='URLAUB'){
      // Urlaub — nur Label + Wetter, keine Uhrzeit
      h+=erste(`<div class="urlaub-label">Urlaub</div>`);
      evs.forEach(ev=>{h+=zeile(ev.zeit||'',ev.text,true);});
    } else if(dd.schicht==='FREI'||evs.length){
      // Frei oder nur Termine — nur Events anzeigen, kein Label
      if(evs.length){
        h+=erste(zeile(evs[0].zeit||'',evs[0].text,true));
        evs.slice(1).forEach(ev=>{h+=zeile(ev.zeit||'',ev.text,true);});
      } else {
        // FREI ohne Events — Wetter rechts, sonst leer
        h+=erste('');
      }
    }
    // Komplett leer: nichts ins content-col

    h+=`</div></div>`;
    if(ft||fer){
      h+=`<div class="tag-row">
        ${fer?'<span class="tag tag-ferien">Schulferien</span>':''}
        ${ft?`<span class="tag tag-feiertag">${ft}</span>`:''}
      </div>`;
    }
    card.innerHTML=h;
    list.appendChild(card);
  }
}
